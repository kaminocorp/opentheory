# Fly.io configuration for the OpenTheory backend (FastAPI).
#
# Region is co-located with the Supabase database (Singapore / ap-southeast-1) so each DB
# round-trip is LAN-local (~1-5ms) instead of a ~230ms cross-Pacific hop. That round-trip cost,
# multiplied per request, dominated latency (a 2-row read was ~2s from iad). See docs/deploy.md
# "Relocating the backend region". `app` was set by `fly launch`.
app = "opentheory-backend"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

# Non-secret runtime config. Secrets (DATABASE_URL, MIGRATION_DATABASE_URL,
# BACKEND_CORS_ORIGINS) are set with `fly secrets set` — never committed here.
[env]
  APP_ENV = "production"
  API_V1_PREFIX = "/api/v1"
  # Supabase project base URL — public (the frontend ships it as NEXT_PUBLIC_SUPABASE_URL).
  # The backend derives the JWKS endpoint (<url>/auth/v1/.well-known/jwks.json) from it to fetch
  # the ES256 public keys that verify session tokens. No shared secret is needed.
  SUPABASE_PROJECT_URL = "https://iaokmtutxponegwebvdu.supabase.co"

# Apply DB migrations on every deploy, in an ephemeral machine, BEFORE the new version takes
# traffic. Uses MIGRATION_DATABASE_URL (the direct, non-pooled connection) via alembic/env.py.
# If this fails, the deploy aborts and the previous version keeps serving.
[deploy]
  release_command = "alembic upgrade head"

[http_service]
  internal_port = 8000
  force_https = true
  # Keep one machine always running so there is no scale-to-zero cold start on the first request
  # after idle (the previous min=0 added a multi-second machine boot on top of DB latency).
  # auto_stop still parks any *extra* machines a surge spins up; the last one stays warm.
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    method = "GET"
    path = "/api/v1/health"
    interval = "15s"
    timeout = "5s"
    grace_period = "10s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
