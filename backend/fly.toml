# Fly.io configuration for the OpenTheory backend (FastAPI).
#
# `app` and `primary_region` are placeholders — `fly launch --no-deploy` will set/confirm them.
# Pick a region close to your Supabase database to keep DB latency low (see `fly platform regions`).
app = "opentheory-backend"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

# Non-secret runtime config. Secrets (DATABASE_URL, MIGRATION_DATABASE_URL,
# BACKEND_CORS_ORIGINS) are set with `fly secrets set` — never committed here.
[env]
  APP_ENV = "production"
  API_V1_PREFIX = "/api/v1"

# Apply DB migrations on every deploy, in an ephemeral machine, BEFORE the new version takes
# traffic. Uses MIGRATION_DATABASE_URL (the direct, non-pooled connection) via alembic/env.py.
# If this fails, the deploy aborts and the previous version keeps serving.
[deploy]
  release_command = "alembic upgrade head"

[http_service]
  internal_port = 8000
  force_https = true
  # Scale to zero when idle (cheap for a preview); the first request after idle cold-starts it.
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    method = "GET"
    path = "/api/v1/health"
    interval = "15s"
    timeout = "5s"
    grace_period = "10s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
